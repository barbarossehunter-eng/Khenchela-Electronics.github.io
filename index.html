<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسعار القطع - Khenchela Electronics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Khenchela Electronics</h1>
            <p>قائمة الأسعار المحدثة للقطع الإلكترونية</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن قطعة (مثال: ESP32، حساس)...">
        </div>

        <div class="table-container">
            <table id="priceTable">
                <thead>
                    <tr>
                        <th>القطعة</th>
                        <th>الصنف</th>
                        <th>السعر (دج)</th>
                        <th>حالة التوفر</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- سيتم جلب البيانات هنا بواسطة الجافاسكربت -->
                </tbody>
            </table>
        </div>
        
        <footer>
            <p id="lastUpdated">آخر تحديث: يتم تحميله...</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
